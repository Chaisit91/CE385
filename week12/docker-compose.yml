version: '3.8'

services:
  db:
    image: postgres:15 
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: "7202" 
      POSTGRES_DB: mydb
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://user:7202@db:5432/mydb
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - app-network

volumes:
  db_data:


networks:
  app-network: